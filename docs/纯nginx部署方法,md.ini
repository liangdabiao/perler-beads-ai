## AI 功能部署方案

### 当前状态

| 部署方式 | AI 功能 | 说明 |
|----------|---------|------|
| Cloudflare Workers | ✅ 正常工作 | API 路由在 Workers 中 |
| Vercel | ✅ 正常工作 | API 路由在 Serverless Functions 中 |
| 静态部署 (Nginx) | ❌ 不工作 | 没有服务端，API 路由不存在 |

